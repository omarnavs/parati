<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>pagina12</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
    font-family:'Montserrat', sans-serif;
    text-align:center;
}

/* contenedor */

.contenido{
    max-width:700px;
}

/* texto */

.texto{
    font-size:28px;
    line-height:1.6;
}

/* link */

a{
    display:inline-block;
    margin-top:20px;
    font-size:22px;
    color:#d40000;
    text-decoration:none;
    font-weight:600;
}

a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="contenido">

<div class="texto">
Que bueno que dijiste que sí a la primera,<br>
aún hay una última sorpresa,<br>
presiona el siguiente link:
</div>

<a href="https://youtu.be/RRBliqBkbD4?si=aJausiMmM1yfcTKq" target="_blank">
Ver sorpresa
</a>

</div>

</body>
</html>
