<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>pagina11</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#e9e9e9;
    font-family:'Montserrat',sans-serif;
    text-align:center;
}

/* titulo */

h1{
    margin-top:40px;
    font-weight:600;
}

/* imagen */

.imagen{
    margin-top:30px;
}

.imagen img{
    width:500px;
}

/* botones */

.botones{
    margin-top:40px;
}

button{
    border:none;
    padding:12px 40px;
    font-size:20px;
    border-radius:8px;
    cursor:pointer;
    margin:10px;
}

#si{
    background:#16a34a;
    color:white;
}

#no{
    background:#d40000;
    color:white;
}

</style>

</head>

<body>

<h1>Volvemos a intentarlo?</h1>

<div class="imagen">
<img src="imgs/Imagen4.png">
</div>

<div class="botones">

<button id="si" onclick="location.href='pagina12.html'">
Si
</button>

<button id="no">
No
</button>

</div>

<script>

let contador = 0;
let escala = 1;

const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");

botonNo.addEventListener("click", function(){

contador++;

escala += 0.4;

botonSi.style.transform = "scale("+escala+")";

/* despues de 7 veces desaparece */

if(contador >= 7){
botonNo.style.display = "none";
}

});

</script>

</body>
</html>
